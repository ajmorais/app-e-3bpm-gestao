<!DOCTYPE html>
<html>
<head>
  <title>E-3BPM GESTAO</title>

  <link rel="manifest2" href="manifest2.json">

  <meta name="theme-color" content="#000000">

</head>

<body style="background:black;color:white;text-align:center;margin-top:50px;">

<h1>E-3BPM GESTAO</h1>

<p>Portal oficial do batalhão</p>

<button onclick="instalar()" style="padding:15px;font-size:18px;">
INSTALAR AGORA
</button>

<script>
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
});

function instalar() {
  if(deferredPrompt){
    deferredPrompt.prompt();
  } else {
    alert("Use o menu do navegador para instalar");
  }
}
</script>

</body>
</html>
