<!DOCTYPE html>
<html>
<head>
  <title>E-3BPM TROPA</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">

</head>

<body style="background:black;color:white;text-align:center;margin-top:50px;">

<h1>E-3BPM TROPA</h1>
<p>Portal oficial do batalhão</p>

<button id="btnInstall" style="display:none;padding:15px;font-size:18px;">
INSTALAR AGORA
</button>

<script>
let deferredPrompt;

// REGISTRA SERVICE WORKER
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}

// Evento de instalação
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;

  document.getElementById("btnInstall").style.display = "block";
});

// Clique no botão instalar
document.getElementById("btnInstall").addEventListener("click", async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;

    if (outcome === 'accepted') {
      // 🔥 REDIRECIONA SÓ DEPOIS DE INSTALAR
      window.location.href = "https://sites.google.com/view/e-3bpmtropa/início";
    }

    deferredPrompt = null;
  }
});

// SE JÁ ESTIVER INSTALADO → abre direto
if (window.matchMedia('(display-mode: standalone)').matches) {
  window.location.href = "https://sites.google.com/view/e-3bpmtropa/início";
}
</script>

</body>
</html>
